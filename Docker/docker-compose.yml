services:
  log-assistant-bot:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NGINX_LOG_ROOT: /var/log/nginx
      STATE_FILE_PATH: /app/.log-assistant.state.json
      REPORTS_DIR: /app
    volumes:
      - ..:/app
      - /var/log/nginx:/var/log/nginx:ro
      - log_assistant_node_modules:/app/node_modules
    command: sh -lc "npm ci --silent && npm start"

  log-assistant-api:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - log-assistant-bot
    env_file:
      - ./.env
    environment:
      NGINX_LOG_ROOT: /var/log/nginx
      STATE_FILE_PATH: /app/.log-assistant.state.json
      REPORTS_DIR: /app
      API_HOST: 0.0.0.0
      API_PORT: 3010
    ports:
      - "3010:3010"
    volumes:
      - ..:/app
      - /var/log/nginx:/var/log/nginx:ro
      - log_assistant_node_modules:/app/node_modules
    command: sh -lc "npm ci --silent && npm run api"

volumes:
  log_assistant_node_modules: